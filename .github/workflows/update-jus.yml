name: Actualizar Valor JUS

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-jus:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Ejecutar script de extracción
        run: python scripts/update_jus.py

      - name: Hacer commit y push de cambios
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add app.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: actualizar valor del JUS automáticamente" && git push)
